<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAM Academy Admin Panel</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f5f7fb;
}

.sidebar{
width:250px;
height:100vh;
background:#0B3D91;
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:8px 0;
border-radius:8px;
}

.sidebar a:hover{
background:#FDB813;
color:black;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
color:#0B3D91;
margin-bottom:10px;
}

.value{
font-size:30px;
font-weight:bold;
color:#FDB813;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>SAM Admin</h2>

<a href="#"><i class="fa-solid fa-house"></i> Dashboard</a>

<a href="#"><i class="fa-solid fa-user-graduate"></i> Students</a>

<a href="#"><i class="fa-solid fa-book"></i> Notes</a>

<a href="#"><i class="fa-solid fa-video"></i> Videos</a>

<a href="#"><i class="fa-solid fa-pen"></i> Tests</a>

<a href="#"><i class="fa-solid fa-bell"></i> Notices</a>

<a href="#"><i class="fa-solid fa-wallet"></i> Fees</a>

<a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>

<div class="main">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<div class="value">120</div>
</div>

<div class="card">
<h3>Teachers</h3>
<div class="value">5</div>
</div>

<div class="card">
<h3>Pending Fees</h3>
<div class="value">18</div>
</div>

<div class="card">
<h3>Today's Attendance</h3>
<div class="value">96%</div>
</div>

</div>

</div>

</body>
</html>
