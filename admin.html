<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAM Academy Admin Panel</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link rel="stylesheet" href="style.css">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
display:flex;
background:#f5f7fb;
}

.sidebar{
width:250px;
height:100vh;
background:#0B3D91;
color:white;
padding:20px;
position:fixed;
}

.sidebar h2{
text-align:center;
margin-bottom:30px;
}

.sidebar a{
display:block;
color:white;
text-decoration:none;
padding:12px;
margin:8px 0;
border-radius:8px;
}

.sidebar a:hover{
background:#FDB813;
color:black;
}

.main{
margin-left:250px;
padding:30px;
width:100%;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
margin-top:20px;
}

.card{
background:white;
padding:25px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
text-align:center;
}

.card h3{
color:#0B3D91;
margin-bottom:10px;
}

.value{
font-size:30px;
font-weight:bold;
color:#FDB813;
}
.section{
margin-top:40px;
background:white;
padding:25px;
border-radius:15px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.student-table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

.student-table th,
.student-table td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

.student-table th{
background:#0B3D91;
color:white;
}

.section input,
.section select{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
}

.add-btn{
background:#0B3D91;
color:white;
padding:12px 20px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

.edit{
background:#FDB813;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.delete{
background:#e53935;
color:white;
border:none;
padding:8px 15px;
border-radius:6px;
cursor:pointer;
}

.paid{
color:green;
font-weight:bold;
}
</style>

</head>

<body>

<div class="sidebar">

<h2>SAM Admin</h2>

<a href="#"><i class="fa-solid fa-house"></i> Dashboard</a>

<a href="#"><i class="fa-solid fa-user-graduate"></i> Students</a>

<a href="#"><i class="fa-solid fa-book"></i> Notes</a>

<a href="#"><i class="fa-solid fa-video"></i> Videos</a>

<a href="#"><i class="fa-solid fa-pen"></i> Tests</a>

<a href="#"><i class="fa-solid fa-bell"></i> Notices</a>

<a href="#"><i class="fa-solid fa-wallet"></i> Fees</a>

<a href="index.html"><i class="fa-solid fa-right-from-bracket"></i> Logout</a>

</div>

<div class="main">

<h1>Admin Dashboard</h1>

<div class="cards">

<div class="card">
<h3>Total Students</h3>
<div class="value">120</div>
</div>

<div class="card">
<h3>Teachers</h3>
<div class="value">5</div>
</div>

<div class="card">
<h3>Pending Fees</h3>
<div class="value">18</div>
</div>

<div class="card">
<h3>Today's Attendance</h3>
<div class="value">96%</div>
</div>

</div>

</div>
<!-- Student Management -->

<div class="section">

<h2>👨‍🎓 Student Management</h2>

<table class="student-table">

<thead>

<tr>

<th>Name</th>

<th>Class</th>

<th>Attendance</th>

<th>Marks</th>

<th>Fees</th>

<th>Action</th>

</tr>

</thead>

<tbody id="studentTable">

</tbody>

<td>10</td>

<td>96%</td>

<td>92%</td>

<td><span class="paid">Paid</span></td>

<td>

<button class="edit">Edit</button>

<button class="delete">Delete</button>

</td>

</tr>

</tbody>

</table>

</div>

<br>

<div class="section">

<h2>➕ Add Student</h2>

<input type="text" placeholder="Student Name">

<input type="text" placeholder="Class">

<input type="number" placeholder="Attendance">

<input type="number" placeholder="Marks">

<select>

<option>Paid</option>

<option>Pending</option>

</select>

<button class="add-btn">

Add Student

</button>

</div>
</body>
</html>
