<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Student Login | SAM Academy</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0b3d91;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:#fff;
padding:40px;
width:350px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h2{
text-align:center;
margin-bottom:25px;
color:#0b3d91;
}

input{
width:100%;
padding:14px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:#ffb400;
border:none;
border-radius:8px;
font-size:18px;
font-weight:bold;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#e6a200;
}

p{
margin-top:15px;
text-align:center;
color:red;
}
</style>

</head>

<body>

<div class="login-box">

<h2>Student Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<input
type="password"
id="password"
placeholder="Password">

<button id="loginBtn">
Login
</button>

<p id="message"></p>

</div>

<script type="module">

import { auth } from "./firebase.js";

import {
signInWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

document.getElementById("loginBtn").onclick=()=>{

const email=document.getElementById("email").value;
const password=document.getElementById("password").value;

signInWithEmailAndPassword(auth,email,password)

.then(()=>{
window.location.href="admin.html";
})

.catch((error)=>{
document.getElementById("message").innerHTML=error.message;
});

};

</script>

</body>
